<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stato Ordine - BistroBò</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="main/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }
        
        .tracker-box { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-top: 20px;
            border-top: 5px solid #2196F3;
        }

        .reparto-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px dashed #ccc;
        }
        .reparto-status:last-child { border-bottom: none; }

        .reparto-nome { font-weight: bold; font-size: 1.1em; color: #333; }
        
        .badge {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        /* Colori dinamici per gli stati */
        .badge.da-fare { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .badge.in-elaborazione { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; animation: pulseLive 1.5s infinite; }
        .badge.completato { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

        @keyframes pulseLive { 
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); } 
        }

        /* Compatibilità con i tuoi temi scuri */
        body.tema-notte .tracker-box, body.tema-astronave .tracker-box { background: #06131E; border: 1px solid #00A6CC; border-top: 5px solid #00A6CC; }
        body.tema-notte .reparto-nome, body.tema-astronave .reparto-nome { color: #D0FFFF; text-shadow: 0 0 2px rgba(0,255,255,.3); }
        body.tema-notte h1, body.tema-astronave h1 { color: #fff; }
    </style>
</head>
<body class="tema-caricato">
    <div id="themeBackground"></div>

    <img src="icon-512.png" alt="Logo" style="width: 100px; margin-top: 20px;">
    <h1 style="margin-bottom: 10px;">BistroBò Live</h1>

    <div class="tracker-box">
        <h2 id="titolo-ordine" style="margin-top: 0; font-size: 2.5em; color: #2196F3; margin-bottom: 5px;">Ricerca...</h2>
        <p style="color: #666; font-size: 0.95em; margin-bottom: 25px;">Aggiornamento in tempo reale 🔄</p>

        <div id="status-container">
            <div style="padding: 20px; font-style: italic;">Connessione al database...</div>
        </div>
    </div>

    <div style="margin-top: 30px; text-align: center; color: #555; font-size: 0.85em; background: rgba(255,255,255,0.7); padding: 10px 20px; border-radius: 20px;">
        Non ricaricare la pagina, si aggiorna da sola!
    </div>

    <script>
        // 1. Inizializza Firebase con i tuoi dati esatti
        const firebaseConfig = {
          apiKey: "AIzaSyCNxXvoeW0uLyY_IFORiOiWw6R6JsqkPDo",
          authDomain: "bistrobo-lan.firebaseapp.com",
          databaseURL: "https://bistrobo-lan-default-rtdb.firebaseio.com",
          projectId: "bistrobo-lan"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Applica il tema in tempo reale
        db.ref("impostazioni/tema").on("value", snap => {
            const tema = snap.val() || "default";
            document.body.className = "tema-caricato tema-" + tema;
        });
        
        // 3. Estrai nomi reparti personalizzati
        let nomiExtra = { extra1: "Extra 1", extra2: "Extra 2", extra3: "Extra 3" };
        db.ref("impostazioni/nomiRepartiExtra").once("value").then(snap => {
            if (snap.exists()) nomiExtra = { ...nomiExtra, ...snap.val() };
        });

        // 4. Ottieni l'ordine dall'URL (es: ?n=14)
        const urlParams = new URLSearchParams(window.location.search);
        const numComanda = urlParams.get('n');
        const container = document.getElementById("status-container");

        if (!numComanda) {
            document.getElementById("titolo-ordine").innerText = "Ordine ❌";
            container.innerHTML = "<p style='color:#d32f2f; font-weight:bold;'>Nessun ordine valido specificato nell'URL.</p>";
        } else {
            document.getElementById("titolo-ordine").innerText = "#" + numComanda.toUpperCase();

            // ==========================================
            // FUNZIONE DI AGGIORNAMENTO GRAFICO
            // ==========================================
            function aggiornaUI(comandaData) {
                function creaStatoReparto(nome, stato) {
                    if (!stato) return ""; 
                    let classeBadge = "da-fare";
                    let testino = "In coda ⏳";
                    if (stato === "in elaborazione") { classeBadge = "in-elaborazione"; testino = "In Preparazione 🍳"; }
                    if (stato === "completato") { classeBadge = "completato"; testino = "Pronto! ✅"; }

                    return `
                        <div class="reparto-status">
                            <span class="reparto-nome">${nome}</span>
                            <span class="badge ${classeBadge}">${testino}</span>
                        </div>
                    `;
                }

                let htmlContent = "";
                if (comandaData.statoCucina) htmlContent += creaStatoReparto("Cucina", comandaData.statoCucina);
                if (comandaData.statoBere) htmlContent += creaStatoReparto("Beverage", comandaData.statoBere);
                if (comandaData.statoSnack) htmlContent += creaStatoReparto("Snack", comandaData.statoSnack);
                if (comandaData.statoExtra1) htmlContent += creaStatoReparto(nomiExtra.extra1, comandaData.statoExtra1);
                if (comandaData.statoExtra2) htmlContent += creaStatoReparto(nomiExtra.extra2, comandaData.statoExtra2);
                if (comandaData.statoExtra3) htmlContent += creaStatoReparto(nomiExtra.extra3, comandaData.statoExtra3);

                if (htmlContent === "") htmlContent = "<p style='color:#777;'>Nessun reparto in lavorazione per questo ordine.</p>";
                container.innerHTML = htmlContent;
            }

            // ==========================================
            // GESTIONE CONFLITTO TESTO/NUMERO E PERMESSI
            // ==========================================
            const queryStr = numComanda.toUpperCase();
            const queryNum = parseInt(numComanda, 10);
            const isSoloNumeri = /^\d+$/.test(numComanda);

            function listenerComande(snap) {
                let comandaData = null;
                // Estrae i dati dal risultato della query
                snap.forEach(child => { comandaData = child.val(); });
                
                if (comandaData) {
                    aggiornaUI(comandaData);
                } else {
                    container.innerHTML = "<p style='color:#555;'>Ordine non trovato o già archiviato.<br><br><i>Se lo stai ancora aspettando, rivolgiti alla cassa.</i></p>";
                }
            }

            function gestioneErrore(err) {
                container.innerHTML = `
                    <div style="background: #ffebee; padding: 15px; border-radius: 10px; border: 1px solid #f44336; color: #d32f2f;">
                        <h3 style="margin-top: 0;">⛔ Accesso Negato</h3>
                        <p style="font-size:0.9em; color:#333;">Le regole di sicurezza di Firebase stanno bloccando la lettura per i clienti.</p>
                        <p style="font-size:0.8em; color:#555;"><i>Dettaglio: ${err.message}</i></p>
                    </div>`;
            }

            // TENTATIVO 1: Cerca la comanda come Testo (es. "14A" o "14")
            let refAttivo = db.ref("comande").orderByChild("numero").equalTo(queryStr);
            
            refAttivo.on("value", snap => {
                // Se non trova niente come Testo, ma il parametro è solo un numero (es. 14)...
                if (!snap.exists() && isSoloNumeri) {
                    // Stacchiamo il vecchio ascoltatore e proviamo come Numero matematico
                    refAttivo.off();
                    refAttivo = db.ref("comande").orderByChild("numero").equalTo(queryNum);
                    refAttivo.on("value", listenerComande, gestioneErrore);
                } else {
                    listenerComande(snap);
                }
            }, gestioneErrore);
        }
    </script>
</body>
</html>
