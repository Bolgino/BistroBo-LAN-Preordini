<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stato Ordine - BistroBò</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="main/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }
        
        .tracker-box { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-top: 20px;
            border-top: 5px solid #2196F3;
        }

        .reparto-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px dashed #ccc;
        }
        .reparto-status:last-child { border-bottom: none; }

        .reparto-nome { font-weight: bold; font-size: 1.1em; color: #333; }
        
        .badge {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        /* Colori dinamici per gli stati (Tema Chiaro / Default) */
        .badge.da-fare { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .badge.in-elaborazione { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; animation: pulseLive 1.5s infinite; }
        .badge.completato { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

        @keyframes pulseLive { 
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); } 
        }

        /* --- STILI BOX ERRORE --- */
        .error-box { background: #ffebee; padding: 15px; border-radius: 10px; border: 1px solid #f44336; color: #d32f2f; }
        .error-box p { color: #333; margin-bottom: 5px; }
        .error-box small { color: #555; }

        /* ========================================================
           ADATTAMENTO PER I TEMI SCURI (Notte e Astronave)
           ======================================================== */
        body.tema-notte .tracker-box, body.tema-astronave .tracker-box { 
            background: #06131E !important; border: 1px solid #00A6CC !important; border-top: 5px solid #00A6CC !important; 
        }
        body.tema-notte .reparto-nome, body.tema-astronave .reparto-nome { 
            color: #D0FFFF !important; text-shadow: 0 0 2px rgba(0,255,255,.3) !important; 
        }
        body.tema-notte h1, body.tema-astronave h1 { color: #fff !important; }

        /* Badge nei temi scuri: tolto il bianco, inseriti colori profondi ad alto contrasto */
        body.tema-notte .badge, body.tema-astronave .badge { text-shadow: none !important; }
        
        body.tema-notte .badge.da-fare, body.tema-astronave .badge.da-fare {
            background: #420000 !important; color: #ff8a80 !important; border-color: #ff5252 !important;
        }
        body.tema-notte .badge.in-elaborazione, body.tema-astronave .badge.in-elaborazione {
            background: #4a2c00 !important; color: #ffb74d !important; border-color: #ff9800 !important;
        }
        body.tema-notte .badge.completato, body.tema-astronave .badge.completato {
            background: #003b2a !important; color: #4dffb2 !important; border-color: #00b35f !important;
        }

        /* Errore nei temi scuri */
        body.tema-notte .error-box, body.tema-astronave .error-box { background: #420000 !important; border-color: #ff5252 !important; color: #ff8a80 !important; }
        body.tema-notte .error-box p, body.tema-astronave .error-box p, body.tema-notte .error-box small, body.tema-astronave .error-box small { color: #ffcdd2 !important; text-shadow: none !important; }
    </style>
</head>
<body class="tema-caricato">
    <div id="themeBackground"></div>

    <img src="icon-512.png" alt="Logo" style="width: 100px; margin-top: 20px;">
    <h1 style="margin-bottom: 10px;">BistroBò Live</h1>

    <div class="tracker-box">
        <h2 id="titolo-ordine" style="margin-top: 0; font-size: 2.5em; color: #2196F3; margin-bottom: 5px;">Ricerca...</h2>
        <p id="sottotitolo-ordine" style="color: #666; font-size: 0.95em; margin-bottom: 25px;">Aggiornamento in tempo reale 🔄</p>

        <div id="status-container">
            <div style="padding: 20px; font-style: italic;">Connessione al database...</div>
        </div>
    </div>

    <!-- Tasto per attivare il suono (sui browser mobile il suono in automatico può essere bloccato senza una prima interazione) -->
    <button id="btnAttivaAudio" style="margin-top: 20px; background: rgba(33, 150, 243, 0.2); color: #2196F3; border: 1px solid #2196F3; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; font-family: 'Poppins', sans-serif;">
        🔊 Attiva Suono Notifiche
    </button>

    <div style="margin-top: 20px; text-align: center; color: #555; font-size: 0.85em; background: rgba(255,255,255,0.7); padding: 10px 20px; border-radius: 20px;">
        Non ricaricare la pagina, si aggiorna da sola!
    </div>

    <script>
        // 1. Inizializza Firebase con i tuoi dati
        const firebaseConfig = {
          apiKey: "AIzaSyCNxXvoeW0uLyY_IFORiOiWw6R6JsqkPDo",
          authDomain: "bistrobo-lan.firebaseapp.com",
          databaseURL: "https://bistrobo-lan-default-rtdb.firebaseio.com",
          projectId: "bistrobo-lan"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variabili globali per Suono
        window.audioAbilitato = false;
        window.ordineProntoNotificato = false;
        
        document.getElementById("btnAttivaAudio").addEventListener("click", function() {
            window.audioAbilitato = true;
            this.innerText = "✅ Notifiche Audio Attive";
            this.style.background = "rgba(76, 175, 80, 0.2)";
            this.style.color = "#4CAF50";
            this.style.borderColor = "#4CAF50";
            // Inizializza un context vuoto per sbloccare le policy dei browser mobile
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if(AudioContext) { const ctx = new AudioContext(); ctx.resume(); }
        });

        // 2. Applica il tema in tempo reale
        db.ref("impostazioni/tema").on("value", snap => {
            const tema = snap.val() || "default";
            document.body.className = "tema-caricato tema-" + tema;
        });
        
        // 3. Estrai nomi reparti personalizzati
        let nomiExtra = { extra1: "Extra 1", extra2: "Extra 2", extra3: "Extra 3" };
        db.ref("impostazioni/nomiRepartiExtra").once("value").then(snap => {
            if (snap.exists()) nomiExtra = { ...nomiExtra, ...snap.val() };
        });

        // 4. Ottieni l'ordine dall'URL (es: ?n=14)
        const urlParams = new URLSearchParams(window.location.search);
        const numComanda = urlParams.get('n');
        const container = document.getElementById("status-container");

        if (!numComanda) {
            document.getElementById("titolo-ordine").innerText = "Ordine ❌";
            container.innerHTML = "<p style='color:#d32f2f; font-weight:bold;'>Nessun ordine valido specificato nell'URL.</p>";
        } else {
            document.getElementById("titolo-ordine").innerText = "#" + numComanda.toUpperCase();

            // ==========================================
            // FUNZIONE SUONO DI COMPLETAMENTO
            // ==========================================
            function playSuonoPronto() {
                if (!window.audioAbilitato) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                try {
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.type = "sine";
                    // Arpeggio felice
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // Do
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15); // Mi
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.3); // Sol
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.45); // Do alto
                    
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 1.2);
                } catch(e) { console.log("Audio bloccato dal browser"); }
            }

            // ==========================================
            // FUNZIONE DI AGGIORNAMENTO GRAFICO
            // ==========================================
            function aggiornaUI(comandaData) {
                function creaStatoReparto(nome, stato) {
                    if (!stato) return ""; 
                    let classeBadge = "da-fare";
                    let testino = "In coda ⏳";
                    if (stato === "in elaborazione") { classeBadge = "in-elaborazione"; testino = "In Preparazione 🍳"; }
                    if (stato === "completato") { classeBadge = "completato"; testino = "Pronto! ✅"; }

                    return `
                        <div class="reparto-status">
                            <span class="reparto-nome">${nome}</span>
                            <span class="badge ${classeBadge}">${testino}</span>
                        </div>
                    `;
                }

                // --- 1. SCOPRIAMO QUALI REPARTI SONO REALMENTE COINVOLTI NELL'ORDINE ---
                let repartiReali = { cucina: false, bere: false, snack: false, extra1: false, extra2: false, extra3: false };
                
                if (comandaData.piatti) {
                    comandaData.piatti.forEach(p => {
                        function segnaReparto(cat, tipo, nomePiatto) {
                            cat = (cat || "").toLowerCase();
                            tipo = (tipo || "").toLowerCase();
                            nomePiatto = (nomePiatto || "").toLowerCase();
                            
                            if (cat === "bevande" || tipo === "bere") repartiReali.bere = true;
                            else if (cat === "extra1" || tipo === "extra1" || cat === "risto") repartiReali.extra1 = true;
                            else if (cat === "extra2" || tipo === "extra2") repartiReali.extra2 = true;
                            else if (cat === "extra3" || tipo === "extra3") repartiReali.extra3 = true;
                            else if (cat === "snack" || cat.includes("fritti") || tipo === "snack" || nomePiatto.includes("patatine") || nomePiatto.includes("fritto")) repartiReali.snack = true;
                            else if (cat !== "servizio") repartiReali.cucina = true;
                        }
                        
                        segnaReparto(p.categoria, p.tipo, p.nome);
                        // Controlla anche eventuali contorni
                        if (p.contorniScelti) {
                            p.contorniScelti.forEach(c => segnaReparto(c.categoria, "", c.nome));
                        }
                    });
                }

                // --- 2. GENERIAMO L'HTML SOLO PER I REPARTI CHE HANNO PIATTI ---
                let htmlContent = "";
                let anyDisplayed = false;
                let allReady = true;

                function controllaEaggiungi(nomeReparto, idReparto, statoDb) {
                    // Genera la riga SOLO se il reparto ha piatti ordinati E ha uno stato nel DB
                    if (repartiReali[idReparto] && statoDb) {
                        anyDisplayed = true;
                        if (statoDb !== "completato") allReady = false;
                        htmlContent += creaStatoReparto(nomeReparto, statoDb);
                    }
                }

                controllaEaggiungi("Cucina", "cucina", comandaData.statoCucina);
                controllaEaggiungi("Beverage", "bere", comandaData.statoBere);
                controllaEaggiungi("Snack", "snack", comandaData.statoSnack);
                controllaEaggiungi(nomiExtra.extra1, "extra1", comandaData.statoExtra1);
                controllaEaggiungi(nomiExtra.extra2, "extra2", comandaData.statoExtra2);
                controllaEaggiungi(nomiExtra.extra3, "extra3", comandaData.statoExtra3);

                if (htmlContent === "") {
                    htmlContent = "<p style='color:#777;'>Nessun reparto in lavorazione per questo ordine.</p>";
                }
                
                container.innerHTML = htmlContent;

                // --- 3. CONTROLLO SUONO E TITOLO ---
                const sottotitolo = document.getElementById("sottotitolo-ordine");
                if (anyDisplayed && allReady) {
                    sottotitolo.innerHTML = "<b style='color:#4CAF50;'>PRONTO PER IL RITIRO! 🎉</b>";
                    // Suona solo la prima volta che diventa tutto pronto
                    if (!window.ordineProntoNotificato) {
                        window.ordineProntoNotificato = true;
                        playSuonoPronto();
                    }
                } else {
                    sottotitolo.innerHTML = "Aggiornamento in tempo reale 🔄";
                    window.ordineProntoNotificato = false; // Resetta nel caso l'ordine torni in lavorazione
                }
            }

            // ==========================================
            // GESTIONE CONFLITTO TESTO/NUMERO E PERMESSI
            // ==========================================
            const queryStr = numComanda.toUpperCase();
            const queryNum = parseInt(numComanda, 10);
            const isSoloNumeri = /^\d+$/.test(numComanda);

            function listenerComande(snap) {
                let comandaData = null;
                snap.forEach(child => { comandaData = child.val(); });
                
                if (comandaData) {
                    aggiornaUI(comandaData);
                } else {
                    container.innerHTML = "<p style='color:#555;'>Ordine non trovato o già archiviato.<br><br><i>Se lo stai ancora aspettando, rivolgiti alla cassa.</i></p>";
                }
            }

            function gestioneErrore(err) {
                container.innerHTML = `
                    <div class="error-box">
                        <h3 style="margin-top: 0;">⛔ Accesso Negato</h3>
                        <p style="font-size:0.95em; font-weight:bold;">Le regole di sicurezza di Firebase stanno bloccando la lettura per i clienti.</p>
                        <small><i>Dettaglio: ${err.message}</i></small>
                    </div>`;
            }

            // Cerca prima come Stringa, se non trova e l'URL è un numero, prova come Numero
            let refAttivo = db.ref("comande").orderByChild("numero").equalTo(queryStr);
            refAttivo.on("value", snap => {
                if (!snap.exists() && isSoloNumeri) {
                    refAttivo.off();
                    refAttivo = db.ref("comande").orderByChild("numero").equalTo(queryNum);
                    refAttivo.on("value", listenerComande, gestioneErrore);
                } else {
                    listenerComande(snap);
                }
            }, gestioneErrore);
        }
    </script>
</body>
</html>
