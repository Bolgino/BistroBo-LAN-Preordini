<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title> Preordina - BistroBò</title>

  <!-- CSS principale -->
  <link rel="stylesheet" href="main/style.css"> 
    <link rel="icon" href="favicon.ico" type="image/x-icon">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <!-- Config Firebase per preordini.html -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
      authDomain: "comande-6fb85.firebaseapp.com",
      databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "comande-6fb85"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    // --- BLOCCO MANUTENZIONE SITO (VERSIONE BLINDATA) ---
    // 1. Inietta una regola CSS assoluta nella pagina
    const styleManutenzione = document.createElement("style");
    styleManutenzione.innerHTML = `
        body.manutenzione-attiva > *:not(#schermataManutenzione) {
            display: none !important;
        }
    `;
    document.head.appendChild(styleManutenzione);
    
    // 2. Prepara la schermata bianca
    const divManutenzione = document.createElement("div");
    divManutenzione.id = "schermataManutenzione";
    divManutenzione.style.cssText = "display: none !important; position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; background: #fff !important; z-index: 999999 !important; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; margin: 0;";
    divManutenzione.innerHTML = `
        <h1 style="font-size: 4em; margin-bottom: 10px;">🛠️</h1>
        <h2 style="color: #d32f2f; font-family: sans-serif;">Sito in Manutenzione</h2>
        <p style="font-size: 1.2em; color: #555; font-family: sans-serif;">Stiamo lavorando per migliorare l'App.<br>Il menù e le ordinazioni non sono temporaneamente disponibili.<br>Riprova più tardi!</p>
    `;
    
    // 3. Ascolta Firebase in sicurezza (anche se il Body non è ancora caricato)
    db.ref("impostazioni/manutenzione").on("value", snap => {
        const manutenzioneAttiva = snap.exists() && snap.val() === true;
        
        const applicaStato = () => {
            // Se il body non esiste ancora, aspetta 50ms e riprova
            if (!document.body) {
                setTimeout(applicaStato, 50);
                return;
            }
            
            // Assicurati che il div sia nel body
            if (!document.getElementById("schermataManutenzione")) {
                document.body.appendChild(divManutenzione);
            }
            
            if (manutenzioneAttiva) {
                // L'aggiunta di questa classe attiva il CSS invisibile su tutto il resto
                document.body.classList.add("manutenzione-attiva");
                divManutenzione.style.setProperty("display", "flex", "important");
            } else {
                // Rimuove il blocco
                document.body.classList.remove("manutenzione-attiva");
                divManutenzione.style.setProperty("display", "none", "important");
                if (divManutenzione.dataset.wasActive === "true") location.reload();
            }
            divManutenzione.dataset.wasActive = manutenzioneAttiva;
        };
        
        applicaStato();
    });
    // ----------------------------------------------------
  </script>

  <!-- Script preordini -->
  <script src="preordini.js" defer></script>
</head>

<body class="preordine-body">

  <div class="preordine-container">
    <h1 class="preordine-title">Preordina al BistroBò</h1>

    <div id="menuClienti" class="preordine-menu"></div>

    <h3 class="preordine-totale">
      Totale: €<span id="totaleCliente">0.00</span>
    </h3>

    <textarea id="noteCliente" class="preordine-note" placeholder="Note (es. senza cipolla, no pomodoro, orario di consegna...)"></textarea>

    <div class="preordine-soldi">
      <label><input type="checkbox" id="soldiGiusti"> Ho i soldi giusti</label>
      <label>Resto richiesto (€): <input type="number" id="restoRichiesto" step="0.5" min="0"></label>
    </div>

    <input type="text" id="nomeCliente" class="preordine-input" placeholder="Il tuo nome">
    <div id="telefonoWrapper" style="display:none;">
        <input type="tel" id="telefonoCliente" class="preordine-input"
          placeholder="Telefono"
          inputmode="numeric"
          pattern="[0-9]{6,15}">
    </div>

    <div id="posizioneWrapper" style="display:none;">
        <input type="text" id="posizioneCliente" class="preordine-input" placeholder="Numero Postazione / Posizione">
    </div>
    <div id="orarioConsegnaWrapper" 
        style="display:none; display:inline-flex; align-items:center; gap:8px;">
        <label>Orario di consegna:</label>
        <input type="time" id="orarioConsegnaCliente" class="preordine-input" style="width:130px;">
    </div>



    <!-- Pulsante in fondo al contenuto -->
    <button id="inviaPreordineBtn" class="preordine-btn">📩 Invia Preordine</button>

    <div id="msgInvio" class="preordine-msg"></div>
  </div>
  <!-- ===================== POPUP DI RIEPILOGO ===================== -->
  <div id="popupRiepilogo" class="popup-riep hidden">
    <div class="popup-content">
        <h2>Riepilogo Ordine</h2>
        <div id="popupRiepilogoContenuto"></div>

        <div class="popup-btns">
            <button id="confermaInvioPreordine" class="preordine-btn">Conferma</button>
            <button id="annullaInvioPreordine" class="preordine-btn">Annulla</button>
        </div>
    </div>
  </div>

  <!-- ===================== NOTIFICA CENTRALE ===================== -->
  <div id="notificaCentrale" class="notifica-centrale hidden"></div>

  <!-- Sfondo dinamico per i temi -->
  <div id="themeBackground"></div>
</body>
</html>
